<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Facebook</title>
    <!-- paso 1.0: agregar el archivo de estilos de bootstrap con el link de css+ el enlace de css dentro de la cabecera -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />
    <!-- 1.0.1: Agregar desde el rel, integrity y crossorigin para seguridad y correcto cargado -->
    <link rel="icon" href="https://www.facebook.com/favicon.ico" type="image/x-icon" />
    <!--Usamos un color gris que destaca facebook-->
    <style>
        /* Estilos personalizados para el fondo y enlaces */
        body {
            background-color: #f0f2f5; /* Color gris claro de fondo para toda la página */
        }

        /* Estilo para el enlace de "¿Olvidaste tu contraseña?" */
        .link-olvidaste {
            color: #2e2f30; /* Color gris oscuro/negro */
            text-decoration: none; /* Sin subrayado */
            padding: 8px; /* Espaciado interno para mejor clickeo */
            border-radius: 6px; /* Bordes redondeados */
            transition: background-color 0.3s; /* Transición suave al hacer hover */
        }

        /* Cambio visual al hacer hover */
        .link-olvidaste:hover {
            background-color: #f0f2f5; /* Gris clarito de Facebook */
            color: #1c1e21; /* Texto oscuro */
        }
    </style>
</head>
<body>
    <!-- Contenedor principal centrado verticalmente -->
    <div class="container d-flex align-items-center" style="min-height: 100vh;"> 
        <!-- Fila con contenido -->
        <div class="row w-100 align-items-center">
            <!-- Columna izquierda: imagen -->
            <div class="col-md-6 text-center mb-4 mb-md-0">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/6/6c/Facebook_Logo_2023.png/1280px-Facebook_Logo_2023.png?utm_source=commons.wikimedia.org&utm_campaign=index&utm_content=thumbnail"
                    alt="Facebook" width="300" class="img-fluid" />
            </div>
            <!-- Columna derecha: logo y título -->
            <div class="col-md-6 d-flex flex-column align-items-center">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/6/6c/Facebook_Logo_2023.png/1280px-Facebook_Logo_2023.png?utm_source=commons.wikimedia.org&utm_campaign=index&utm_content=thumbnail"
                    alt="Facebook" width="300" class="mb-3" />
                <h2 class="display-5 fw-bold text-center"> Explora
                    lo que <span class="text-primary">más te
                        gusta</span>.
                </h2>
            </div>
        </div>
        <!-- Formulario de inicio de sesión -->
        <div class="col-md-5 offset-md-1 mt-4">
            <div class="card shadow border-0 p-4 rounded-3">
                <form>
                    <input type="text" class="form-control mb-3 py-3 shadow-sm"
                        placeholder="Número de celular o correo electrónico" />
                    <input type="password" class="form-control mb-3 py-3 shadow-sm" placeholder="Contraseña" />
                    <button type="button" class="btn btn-primary w-100 fw-bold py-2 mb-3">Iniciar sesión</button>
                    <div class="text-center my-3">
                        <a href="#" class="link-olvidaste">¿Olvidaste tu contraseña?</a>
                    </div>
                    <hr class="my-4" />
                    <button type="button" class="btn btn-outline-primary w-100 fw-bold py-2">Crear cuenta nueva</button>
                </form>
            </div>
        </div>
        <!-- Imagen de fondo central -->
        <div class="col-12 text-center mt-4">
            <img src="img_fondo_facebook.png" alt="Imagen central de la pagina de inicio" class="img-fluid" />
        </div>
    </div>

    <!-- Scripts de Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
        integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js"
        integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y"
        crossorigin="anonymous"></script>
</body>
</html>
